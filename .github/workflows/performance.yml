name: Performance Tests

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 21 * * 1-5'  # runs Monday to Friday at 6pm BRT (UTC-3)

jobs:
  smoke:
    name: Smoke test (a cada push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run smoke test
        run: k6 run tests/k6/performance/smoke.test.ts
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}

  load:
    name: Load test (scheduled — not in all push)
    runs-on: ubuntu-latest
    needs: smoke                              # runs only if snoke results in OK
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run load test
        run: k6 run --out json=results.json tests/k6/performance/load.test.ts
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: results.json