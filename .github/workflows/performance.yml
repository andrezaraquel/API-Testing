name: Performance Tests

on:
  push:
    branches: [main, develop, implemen_k6_performance_tests]
  schedule:
    - cron: '0 21 * * 1-5'  # runs Monday to Friday at 6pm BRT (UTC-3)

jobs:
  smoke:
    name: Smoke test (each push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run smoke test
        run: k6 run tests/k6/performance/smoke.test.ts
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}

  load:
    name: Load test (scheduled — not on every push)
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run load test
        run: k6 run --out json=results.json tests/k6/performance/load.test.ts
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: results.json