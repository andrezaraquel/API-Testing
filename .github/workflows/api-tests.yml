name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start mock server
        run: npx json-server --watch db.json --port 3000 &

      - name: Wait for mock server
        run: npx wait-on http://localhost:3000/products --timeout 10000

      - name: Run tests
        run: npx jest --verbose --coverage
        env:
          BASE_URL: http://localhost:3000