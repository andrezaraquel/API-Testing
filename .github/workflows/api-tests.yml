name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start mock server
        run: ./node_modules/.bin/json-server db.json --port 3000 --host 127.0.0.1 &

      - name: Wait for mock server
        run: |
          for i in $(seq 1 15); do
            curl -s http://127.0.0.1:3000/products > /dev/null && echo "Server ready!" && exit 0
            echo "Attempt $i failed, waiting..."
            sleep 2
          done
          echo "Server never became ready"
          exit 1
      - name: Run tests
        run: npx jest --verbose --coverage
        env:
          BASE_URL: http://127.0.0.1:3000