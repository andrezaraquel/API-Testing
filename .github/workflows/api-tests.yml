name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start mock server
        run: ./node_modules/.bin/json-server db.json --port 3000 &

      - name: Debug - aguarda e inspeciona
        run: |
          sleep 5
          echo "=== Processos rodando ==="
          ps aux | grep json-server
          echo "=== Tentando curl ==="
          curl -v http://localhost:3000/products || true
          echo "=== Portas abertas ==="
          ss -tlnp | grep 3000 || true

      - name: Wait for mock server
        run: ./node_modules/.bin/wait-on http://localhost:3000/products --timeout 30000

      - name: Run tests
        run: npx jest --verbose --coverage
        env:
          BASE_URL: http://localhost:3000